name: "Tests"

on:
  pull_request:
    branches:
      - master
      - 'release-'
      - v10
    paths-ignore:
      - 'docs/**'
  push:
    branches:
      - master
    paths-ignore:
      - 'docs/**'
      - 'benchmark/**'

concurrency:
  # Skip intermediate builds: always, but for the master branch.
  # Cancel intermediate builds: always, but for the master branch.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
  # Julia 1.11+ picks up SciMLBase from [sources] in Project.toml automatically
  tests:
    name: "Tests"
    strategy:
      fail-fast: false
      matrix:
        version:
          - "1"
          - "pre"
        group:
          - CPU
          - JLArrays
          - OpenCL
          - QA
        exclude:
          - version: "pre"
            group: QA
    uses: "SciML/.github/.github/workflows/tests.yml@master"
    with:
      julia-version: "${{ matrix.version }}"
      group: "${{ matrix.group }}"
    secrets: "inherit"

  # Julia 1.10 (lts) doesn't support [sources], so we inline the steps
  # and Pkg.add SciMLBase from the branch before testing.
  tests-lts:
    name: "Tests (lts)"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        group:
          - CPU
          - JLArrays
          - OpenCL
          - QA
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: "lts"
      - uses: julia-actions/cache@v2
      - name: "Dev SciMLBase from branch"
        run: |
          julia --project -e '
            using Pkg
            Pkg.add(url="https://github.com/isaacsas/SciMLBase.jl.git", rev="ensemble_rng_redesign")
          '
      - name: "Build package"
        run: julia --project -e 'using Pkg; Pkg.instantiate(); Pkg.build()'
      - name: "Run tests"
        run: julia --project -e 'using Pkg; Pkg.test()'
        env:
          GROUP: ${{ matrix.group }}
